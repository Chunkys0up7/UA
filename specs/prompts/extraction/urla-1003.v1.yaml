id: extraction/urla-1003
version: 1
purpose: Extract declarations and cross-check fields from a URLA (Form 1003) text rendering (register row 7)
model_params:
  temperature: 0
  max_tokens: 2048
output_schema:
  type: object
  additionalProperties: false
  properties:
    declarations:
      type: object
      additionalProperties: false
      properties:
        outstanding_judgments: {type: boolean}
        bankruptcy_7yr: {type: boolean}
        foreclosure_7yr: {type: boolean}
        party_to_lawsuit: {type: boolean}
        delinquent_federal_debt: {type: boolean}
        occupancy_intent_primary: {type: boolean}
        undisclosed_borrowed_funds: {type: boolean}
    stated_income_monthly: {type: string, pattern: "^[0-9]+\\.[0-9]{2}$"}
    stated_liabilities_monthly: {type: string, pattern: "^[0-9]+\\.[0-9]{2}$"}
    employer_names: {type: array, items: {type: string}}
    confidence: {type: object, additionalProperties: {type: number, minimum: 0, maximum: 1}}
template: |
  You are a document-extraction engine for mortgage underwriting. Extract fields from the
  URLA (Form 1003) below. Rules:
  - Return ONLY a JSON object matching the output schema. No prose, no markdown fences.
  - Monetary values: digits with exactly two decimals, no commas or currency symbols.
  - Declarations: answer strictly from the document's checked boxes.
  - If a field is not present, omit it and give it confidence 0.
  - Include a "confidence" object scoring each extracted field from 0 to 1.
  <document>
  {{document_text}}
  </document>
