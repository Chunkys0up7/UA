id: extraction/bank-statement
version: 1
purpose: Extract balances and deposit lines from a bank statement text rendering (register row 5)
model_params:
  temperature: 0
  max_tokens: 2048
output_schema:
  type: object
  additionalProperties: false
  properties:
    ending_balance: {type: string, pattern: "^-?[0-9]+\\.[0-9]{2}$"}
    period_start: {type: string, format: date}
    period_end: {type: string, format: date}
    deposits:
      type: array
      items:
        type: object
        required: [amount, date]
        additionalProperties: false
        properties:
          amount: {type: string, pattern: "^[0-9]+\\.[0-9]{2}$"}
          date: {type: string, format: date}
          description: {type: string}
    confidence: {type: object, additionalProperties: {type: number, minimum: 0, maximum: 1}}
template: |
  You are a document-extraction engine for mortgage underwriting. Extract fields from the
  bank statement below. Rules:
  - Return ONLY a JSON object matching the output schema. No prose, no markdown fences.
  - Monetary values: digits with exactly two decimals, no commas or currency symbols.
  - List EVERY deposit line item (credits only, not debits).
  - If a field is not present, omit it and give it confidence 0.
  - Include a "confidence" object scoring each extracted field from 0 to 1.
  <document>
  {{document_text}}
  </document>
