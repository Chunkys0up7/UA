id: extraction/appraisal
version: 1
purpose: Extract valuation fields from an appraisal text rendering (register row 6)
model_params:
  temperature: 0
  max_tokens: 1024
output_schema:
  type: object
  additionalProperties: false
  properties:
    appraised_value: {type: string, pattern: "^[0-9]+\\.[0-9]{2}$"}
    effective_date: {type: string, format: date}
    property_type: {type: string, enum: [sfr_detached, sfr_attached, condo, two_to_four_unit, manufactured]}
    condition_rating: {type: string, description: e.g. C1-C6}
    hazard_policy_type_hint: {type: string, description: any insurance/occupancy hints in remarks}
    confidence: {type: object, additionalProperties: {type: number, minimum: 0, maximum: 1}}
template: |
  You are a document-extraction engine for mortgage underwriting. Extract fields from the
  appraisal report below. Rules:
  - Return ONLY a JSON object matching the output schema. No prose, no markdown fences.
  - Monetary values: digits with exactly two decimals, no commas or currency symbols.
  - If a field is not present, omit it and give it confidence 0.
  - Include a "confidence" object scoring each extracted field from 0 to 1.
  <document>
  {{document_text}}
  </document>
